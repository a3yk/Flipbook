<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flipbook</title>

<link rel="stylesheet" href="./style.css">

<style>

body{
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#eee;
}

#flip_book{
position:relative;
width:900px;
height:600px;
perspective:1500px;
}

.page{
position:absolute;
width:50%;
height:100%;
top:0;
right:0;
transform-origin:left;
transition:transform 0.8s;
transform-style:preserve-3d;
}

.page img{
width:100%;
height:100%;
object-fit:contain;
background:white;
}

.page img{
width:100%;
height:100%;
object-fit:contain;
display:block;
background:white;
}

.front_page,
.back_page{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
}

.back_page{
transform:rotateY(180deg);
}

.page.flipped{
transform:rotateY(-180deg);
}

.front_cover,
.back_cover{
position:absolute;
width:50%;
height:100%;
background:white;
}

.front_cover{
left:0;
}

.back_cover{
right:0;
}

</style>

</head>

<body>

<div id="flip_book">

<div class="front_cover" id="cover"></div>

<div id="pages_container"></div>

<div class="back_cover" id="back"></div>

</div>


<script>

const username = "a3yk"
const repo = "portfolio"
const folder = "assets/images/pages"

const api =
`https://api.github.com/repos/${username}/${repo}/contents/${folder}`

fetch(api)
.then(r=>r.json())
.then(data=>{

const images = data
.filter(f=>f.name.match(/\.(jpg|jpeg|png|webp)$/i))
.sort((a,b)=>{
const numA = parseInt(a.name.match(/\d+/)[0])
const numB = parseInt(b.name.match(/\d+/)[0])
return numA - numB
})

const cover = document.getElementById("cover")
const back = document.getElementById("back")
const container = document.getElementById("pages_container")

cover.innerHTML = `<img src="${images[0].download_url}">`
back.innerHTML = `<img src="${images[images.length-1].download_url}">`

let pageIndex = 1

for(let i=1;i<images.length-1;i+=2){

const front = images[i]
const backImg = images[i+1]

const page = document.createElement("div")
page.className = "page"
page.style.zIndex = images.length-pageIndex

page.innerHTML = `
<div class="front_page">
<img src="${front.download_url}">
</div>

<div class="back_page">
<img src="${backImg ? backImg.download_url : ""}">
</div>
`

page.onclick = ()=>{
page.classList.toggle("flipped")
}

container.appendChild(page)

pageIndex++

}

})

</script>

</body>

</html>
