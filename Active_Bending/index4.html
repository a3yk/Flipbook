<script>

const username = "a3yk"
const repo = "Flipbook"
const folder = "Active_Bending/assets/images/pages"

const api =
`https://api.github.com/repos/${username}/${repo}/contents/${folder}`

let pages = []
let currentPage = 0

fetch(api)
.then(r=>r.json())
.then(data=>{

const images = data
.filter(f=>f.name.match(/\.(jpg|jpeg|png|webp)$/i))
.sort((a,b)=>{
const numA=parseInt(a.name.match(/\d+/)[0])
const numB=parseInt(b.name.match(/\d+/)[0])
return numA-numB
})

const container = document.getElementById("pages_container")

let pageIndex=0

for(let i=0;i<images.length;i+=2){

const front = images[i]
const back = images[i+1]

const page=document.createElement("div")
page.className="page"

page.style.zIndex = images.length-pageIndex

page.innerHTML=`
<div class="front_page">
<img class="front_content" src="${front.download_url}">
</div>

<div class="back_page">
<img class="back_content" src="${back ? back.download_url : ""}">
</div>
`

container.appendChild(page)

pages.push(page)

pageIndex++

}

})

/* ---------- PAGE NAVIGATION ---------- */

function nextPage(){

if(currentPage >= pages.length) return

pages[currentPage].classList.add("flipped")

currentPage++

}

function prevPage(){

if(currentPage <= 0) return

currentPage--

pages[currentPage].classList.remove("flipped")

}

/* ---------- CLICK ZONES ---------- */

document.getElementById("flip_book")
.addEventListener("click",(e)=>{

const rect=e.currentTarget.getBoundingClientRect()
const x=e.clientX-rect.left

if(x > rect.width/2){

nextPage()

}else{

prevPage()

}

})

/* ---------- KEYBOARD ---------- */

document.addEventListener("keydown",(e)=>{

if(e.key==="ArrowRight") nextPage()

if(e.key==="ArrowLeft") prevPage()

})

/* ---------- TRACKPAD SWIPE ---------- */

let startX=0

document.addEventListener("touchstart",(e)=>{
startX=e.touches[0].clientX
})

document.addEventListener("touchend",(e)=>{

let diff = e.changedTouches[0].clientX-startX

if(diff < -50) nextPage()

if(diff > 50) prevPage()

})

</script>
